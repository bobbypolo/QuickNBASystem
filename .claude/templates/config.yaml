# Project Configuration
# This file is the single source of truth for runtime settings.
# Copy to config.yaml and fill in project-specific values.

# Application Settings
app:
  name: "[Project Name]"
  environment: development  # development | staging | production
  debug: true
  log_level: INFO  # DEBUG | INFO | WARNING | ERROR

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000"

# Database
database:
  # Connection string or individual params
  url: "${DATABASE_URL}"  # Use env var
  pool_size: 5
  max_overflow: 10

# External Services (use env vars for secrets)
services:
  # Example service configuration
  # alpaca:
  #   api_key: "${ALPACA_API_KEY}"
  #   api_secret: "${ALPACA_API_SECRET}"
  #   base_url: "https://paper-api.alpaca.markets"

# Feature Flags
features:
  # feature_name: true/false
  example_feature: false

# Domain-Specific Settings (customize per project)
# domain:
#   setting_name: value
#   another_setting: value

# Monitoring
monitoring:
  enabled: false
  # prometheus_port: 9090
  # healthcheck_interval: 30
